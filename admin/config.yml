backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'Create {{collection}} “{{slug}}”'
    update: 'Update {{collection}} “{{slug}}”'
    delete: 'Delete {{collection}} “{{slug}}”'
    uploadMedia: 'Upload “{{path}}”'
    moveMedia: 'Move “{{path}}”'
    deleteMedia: 'Delete “{{path}}”'

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "identity"
    label: "1. Identity & Contact"
    files:
      - name: "general"
        label: "Logo, ASI#, & Contact Info"
        file: "content/settings/general.json"
        fields:
          - {label: "Site Name", name: "site_name", widget: "string"}
          - {label: "Logo Image", name: "logo_image", widget: "image", required: false}
          - {label: "Logo Text (Fallback)", name: "logo_text", widget: "string"}
          - {label: "ASI Number", name: "asi_number", widget: "string"}
          - {label: "Contact Email", name: "email", widget: "string"}
          - {label: "Contact Phone", name: "phone", widget: "string"}
          - {label: "Office Address", name: "address", widget: "text"}
          - label: "Footer Settings"
            name: "footer"
            widget: "object"
            fields:
              - {label: "Copyright Name", name: "copyright", widget: "string"}
              - {label: "Footer Description", name: "about_text", widget: "text"}

  - name: "content"
    label: "2. Page Content"
    files:
      - name: "home"
        label: "Home Page (Hero & Ethical)"
        file: "content/pages/home.json"
        fields:
          - label: "Hero Banner"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Main Title", name: "title", widget: "string"}
              - {label: "Subtitle", name: "subtitle", widget: "text"}
              - {label: "Background Image", name: "image", widget: "image"}
          - label: "Ethical Commitment Section"
            name: "ethical"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Detailed Description", name: "desc", widget: "text"}
      - name: "about"
        label: "About Us Page"
        file: "content/pages/about.json"
        fields:
          - {label: "Heading", name: "title", widget: "string"}
          - {label: "Main Content", name: "content", widget: "markdown"}

  - name: "catalog"
    label: "3. Product Catalog"
    files:
      - name: "products"
        label: "Products Management"
        file: "products.json"
        fields:
          - label: "All Products"
            name: "products"
            widget: "list"
            fields:
              - {label: "Product Name", name: "name", widget: "string"}
              - {label: "Item # (ASI Number)", name: "product_number", widget: "string"}
              - {label: "Base Price (As low as)", name: "price", widget: "number", value_type: "float"}
              - {label: "Category", name: "category", widget: "string"}
              - {label: "Full Description", name: "description", widget: "markdown"}
              - {label: "Short Summary", name: "summary", widget: "text"}
              - {label: "Main Image", name: "image", widget: "image"}
              - label: "Gallery Images"
                name: "images"
                widget: "list"
                field: {label: "Image URL", name: "url", widget: "image"}
              - {label: "Featured (Show on Home)", name: "featured", widget: "boolean", default: false}
              - label: "Product Specifications"
                name: "details"
                widget: "object"
                fields:
                  - {label: "Colors", name: "colors", widget: "string"}
                  - {label: "Materials", name: "materials", widget: "string"}
                  - {label: "Size", name: "size", widget: "string"}
                  - {label: "Imprint Method", name: "imprint_method", widget: "string"}
                  - {label: "Imprint Color", name: "imprint_color", widget: "string"}
                  - {label: "Production Time", name: "production_time", widget: "string"}
                  - {label: "Price Includes", name: "price_includes", widget: "string"}
              - label: "Tiered Pricing Grid"
                name: "pricing_grid"
                widget: "list"
                fields:
                  - {label: "Quantity", name: "qty", widget: "number"}
                  - {label: "Price ($)", name: "price", widget: "number", value_type: "float"}
                  - {label: "Code", name: "code", widget: "string"}
