backend:
  name: github
  repo: julianheatpumpworld-boop/freezone-web
  branch: main

media_folder: "assets/img" # Images will be saved here
public_folder: "/assets/img"

collections:
  - name: "products"
    label: "Products"
    files:
      - file: "products.json"
        label: "Product List"
        name: "product_list"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Price", name: "price", widget: "number", value_type: "float"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Image", name: "image", widget: "image"}
              - {label: "Category", name: "category", widget: "string"}
